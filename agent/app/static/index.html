<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SE Content Agent</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-muted: #aaa;
    --user-bg: #0f3460;
    --agent-bg: #1a1a2e;
    --border: #2a2a4a;
    --input-bg: #16213e;
    --scrollbar: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    font-weight: 600;
  }
  header .logo .icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header .actions { display: flex; gap: 8px; }
  header button {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  header button:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  .message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.55;
    font-size: 0.95rem;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
  }
  .message.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .message .role {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .message.agent .role { color: var(--accent); }

  /* ── Typing indicator ── */
  .typing {
    align-self: flex-start;
    padding: 12px 16px;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing span {
    width: 8px; height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── Input area ── */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  #question {
    flex: 1;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.95rem;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 150px;
    transition: border-color 0.2s;
  }
  #question:focus { border-color: var(--accent); }
  #question::placeholder { color: var(--text-muted); }
  #sendBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #sendBtn:hover:not(:disabled) { opacity: 0.85; }

  /* ── Welcome ── */
  .welcome {
    text-align: center;
    color: var(--text-muted);
    margin: auto;
    max-width: 500px;
  }
  .welcome h2 { color: var(--text); margin-bottom: 8px; font-size: 1.3rem; }
  .welcome p { font-size: 0.9rem; line-height: 1.5; }

  /* ── Status indicator ── */
  .status {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf50;
  }
  .status.error .dot { background: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="icon">&#9889;</div>
    <span>SE Content Agent</span>
    <div class="status" id="status">
      <div class="dot"></div>
      <span>connected</span>
    </div>
  </div>
  <div class="actions">
    <button onclick="newSession()" title="Start new conversation">New Chat</button>
  </div>
</header>

<div id="chat">
  <div class="welcome">
    <h2>SE Content Agent</h2>
    <p>AI assistant for ContentEdge document management.<br>
    Search, archive, export/import content classes, indexes, and archiving policies.</p>
  </div>
</div>

<div class="input-area">
  <textarea id="question" rows="1" placeholder="Type your message…"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="send()">&#10148;</button>
</div>

<script>
const API = window.location.origin;
let sessionId = crypto.randomUUID();
let busy = false;

function $(id) { return document.getElementById(id); }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function scrollBottom() {
  const c = $('chat');
  c.scrollTop = c.scrollHeight;
}

function addMessage(role, text) {
  // Remove welcome if present
  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'message ' + role;
  const roleLabel = document.createElement('div');
  roleLabel.className = 'role';
  roleLabel.textContent = role === 'user' ? 'You' : 'Agent';
  const body = document.createElement('div');
  body.textContent = text;
  div.appendChild(roleLabel);
  div.appendChild(body);
  $('chat').appendChild(div);
  scrollBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  $('chat').appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const el = $('typing');
  if (el) el.remove();
}

function setStatus(ok) {
  const s = $('status');
  s.className = ok ? 'status' : 'status error';
  s.querySelector('span').textContent = ok ? 'connected' : 'error';
}

async function send() {
  if (busy) return;
  const input = $('question');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  busy = true;
  $('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch(API + '/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text, session_id: sessionId })
    });
    hideTyping();
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    addMessage('agent', data.answer || data.detail || 'No response');
    setStatus(true);
  } catch (e) {
    hideTyping();
    addMessage('agent', 'Error: ' + e.message);
    setStatus(false);
  } finally {
    busy = false;
    $('sendBtn').disabled = false;
    $('question').focus();
  }
}

function newSession() {
  // Clear server-side history
  fetch(API + '/chat/' + sessionId, { method: 'DELETE' }).catch(() => {});
  sessionId = crypto.randomUUID();
  $('chat').innerHTML = `
    <div class="welcome">
      <h2>SE Content Agent</h2>
      <p>AI assistant for ContentEdge document management.<br>
      Search, archive, export/import content classes, indexes, and archiving policies.</p>
    </div>`;
}

// Health check on load
fetch(API + '/health').then(r => setStatus(r.ok)).catch(() => setStatus(false));
$('question').focus();
</script>
</body>
</html>
